name: release

# release-please maintains a release PR (version bump + CHANGELOG) from
# conventional-commit history. Merging it cuts a vX.Y.Z tag + GitHub Release,
# which triggers the macOS build to attach the .dmg. The build is also runnable
# on demand for an existing tag via workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach the macOS bundle to (e.g. v0.1.0)"
        required: true

permissions: {}

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # AWS OIDC, to read the release-bot App key from Secrets Manager
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Authenticate as a GitHub App (when configured) instead of the default
      # GITHUB_TOKEN. GitHub deliberately won't let GITHUB_TOKEN-authored events
      # start new workflow runs, so a release PR opened by it — and the
      # Cargo.lock-sync push below — leave the `desktop` PR gate stuck "awaiting
      # approval". An App-token-authored PR/push triggers it normally.
      # The App's Client ID is the RELEASE_APP_CLIENT_ID variable; its private
      # key is read from AWS Secrets Manager via OIDC (no key stored in GitHub),
      # matching how the macOS build below loads its signing material. All gated
      # on that variable, falling back to GITHUB_TOKEN when it's unset.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-release-signing
          aws-region: us-west-1

      - name: Load release-bot App private key
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
        # Multi-line PEM into $GITHUB_ENV via a heredoc; never echoed, so the key
        # stays out of the logs (same posture as the macOS signing secrets).
        run: |
          key=$(aws secretsmanager get-secret-value --secret-id lux/release-app-private-key --query SecretString --output text)
          {
            echo "RELEASE_APP_PRIVATE_KEY<<__EOF__"
            printf '%s\n' "$key"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Mint release token (GitHub App)
        id: app-token
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ env.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token || github.token }}

      # release-please uses release-type "simple", which bumps the version in
      # apps/desktop/src-tauri/Cargo.toml but leaves the `lux` entry in the root
      # Cargo.lock at the old version, so the
      # lockfile shows up dirty on the next local `cargo` run. While a release PR is
      # open, sync the lockfile onto its branch so main never lands a stale lock.
      # Runs in this job by necessity: a push authored by GITHUB_TOKEN can't trigger
      # a separate workflow, so the release branch wouldn't get picked up elsewhere.
      - name: Sync Cargo.lock to the release version
        if: ${{ steps.release.outputs.pr }}
        env:
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_BRANCH=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')
          echo "Release PR branch: $PR_BRANCH"
          git fetch --depth=1 origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          version=$(jq -r '."."' .release-please-manifest.json)
          # The `lux` workspace member has no checksum in the lock, so its version
          # is a pure text field — sync it without invoking cargo (no dep churn).
          VER="$version" perl -0pi -e 's/(name = "lux"\nversion = ")[^"]*/$1$ENV{VER}/' Cargo.lock
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock already in sync at $version"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock to $version"
          git push origin "HEAD:$PR_BRANCH"
          echo "Synced Cargo.lock to $version on $PR_BRANCH"

  # The release gate: the same checks as the PR/main `desktop` workflow
  # (tauri-versions, frontend build/typecheck/lint, cargo test --workspace),
  # re-run against the exact release commit. Everything that ships — infra,
  # Lambda code, the desktop bundle — is downstream of this job, so a red main
  # cannot release.
  ci:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: ./.github/workflows/desktop.yml

  # Builds, signs, and notarizes the macOS app and attaches it (plus the
  # updater's latest.json) to the release — after a release-please release, or
  # on a manual dispatch for an existing tag. On the release path this runs
  # LAST, only after the Lambdas deployed and passed their smokes: the updater
  # manifest publishing is what makes a release visible to users, so a release
  # whose backend didn't ship never reaches them. Manual dispatch rebuilds an
  # existing tag whose backend already shipped, so it skips those gates.
  build-macos:
    needs: [release-please, deploy-lambdas]
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || (needs.release-please.outputs.release_created == 'true' && needs.deploy-lambdas.result == 'success')) }}
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write # AWS OIDC, to read the updater signing key
    env:
      TAG: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # Per-crate compilation cache (GitHub Actions backend), supplementing
      # rust-cache: it still hits across a Cargo.lock bump for the universal
      # build's per-arch dependency compilation, though the final fat-LTO link
      # itself isn't cacheable.
      - uses: mozilla-actions/sccache-action@v0.0.10

      # Cache the compiled dependency tree. ~90% of this build is dependencies
      # compiled from scratch, twice (once per arch), under the deliberately
      # slow release profile (codegen-units = 1 + fat LTO — Tauri's recommended
      # smallest-binary config, kept as-is). rust-cache restores those dep
      # artifacts keyed on Cargo.lock, so only the workspace crates + the final
      # LTO link recompile. The cache is scoped to the workspace-root target/.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - run: bun install
        working-directory: apps/desktop

      # Pull the updater signing key from AWS Secrets Manager via OIDC — no
      # long-lived AWS keys in GitHub. Written to a file so it never hits a log.
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-release-signing
          aws-region: us-west-1
      - name: Load updater signing key
        # The secret is JSON {key, password}. Write the key to a file (printf '%s'
        # avoids a trailing newline that would break the base64 decode) and pass
        # the password via $GITHUB_ENV, masked so it never appears in logs.
        run: |
          secret=$(aws secretsmanager get-secret-value --secret-id lux/updater-signing-key --query SecretString --output text)
          printf '%s' "$(printf '%s' "$secret" | jq -r '.key')" > "$RUNNER_TEMP/updater.key"
          password=$(printf '%s' "$secret" | jq -r '.password')
          echo "::add-mask::$password"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Load Apple signing secret
        # JSON {certificate (.p12 b64), certificate_password, signing_identity,
        # team_id, api_key (.p8), api_key_id, api_issuer_id} -> tauri-action env.
        # tauri-action reads APPLE_* from the process env (set via $GITHUB_ENV).
        run: |
          s=$(aws secretsmanager get-secret-value --secret-id lux/apple-signing --query SecretString --output text)
          echo "::add-mask::$(printf '%s' "$s" | jq -r '.certificate_password')"
          {
            echo "APPLE_CERTIFICATE=$(printf '%s' "$s" | jq -r '.certificate')"
            echo "APPLE_CERTIFICATE_PASSWORD=$(printf '%s' "$s" | jq -r '.certificate_password')"
            echo "APPLE_SIGNING_IDENTITY=$(printf '%s' "$s" | jq -r '.signing_identity')"
            echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')"
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}/updater.key
        with:
          projectPath: apps/desktop
          tagName: ${{ env.TAG }}
          args: --target universal-apple-darwin

      - name: sccache stats
        if: ${{ always() }}
        run: sccache --show-stats

  # Apply the infra when a release is cut — i.e. when the release-please
  # version-bump PR is merged (release_created). This is the ONLY place
  # `terraform apply` runs; never on a laptop. The lux-terraform-apply role's
  # trust is scoped to refs/heads/main, so only this main-branch run can assume
  # it. Skipped on workflow_dispatch (manual macOS rebuilds) and on pushes that
  # don't cut a release. An infra PR therefore merges first and applies here with
  # the next release — its diff was reviewed as the terraform.yml PR plan.
  terraform-apply:
    needs: [release-please, ci]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.ci.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: assume the apply role
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v7

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-terraform-apply
          aws-region: us-west-1

      - uses: hashicorp/setup-terraform@v4

      - name: init
        run: terraform init -input=false

      # One automatic retry: when an apply expands the apply role's own inline
      # policy and creates resources needing the new grants in the same run,
      # IAM propagation can lose the race. terraform apply is idempotent, so
      # the second pass just finishes whatever the first couldn't.
      - name: apply
        run: |
          terraform apply -auto-approve -no-color -input=false || {
            echo "::warning::apply failed once; retrying after IAM propagation delay"
            sleep 20
            terraform apply -auto-approve -no-color -input=false
          }

  # Ship the Lambda code — every release, from the release tag, after the infra
  # is in place. Deploying all three every time (even when only one changed)
  # keeps deployed code == main with no path-filter guesswork: workspace crates
  # like lux-wire feed all of them, and a redeploy of unchanged code is a no-op.
  # Each function then gets a smoke test that proves the new code actually cold
  # starts and answers before the desktop artifacts are allowed to publish.
  deploy-lambdas:
    needs: [release-please, terraform-apply]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.terraform-apply.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: assume the lambda-deploy role
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      # cargo-lambda cross-links against an AL2023-compatible glibc via zig; a
      # plain host build on ubuntu-latest links a newer glibc than the Lambda
      # runtime ships and fails at cold start with missing symbol versions.
      - name: Install cargo-lambda (+ zig for the AL2023-safe link)
        run: pip3 install cargo-lambda ziglang

      # The role is created by the terraform-apply job that just ran, so on the
      # very first release after it lands, STS may not see it instantly —
      # retry the assume instead of failing the release.
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-lambda-deploy
          aws-region: us-west-1
          retry-max-attempts: 6

      - name: Build
        run: cargo lambda build --release --x86-64 -p lux-sync-api -p lux-iot-authorizer -p lux-discord-bot

      - name: Deploy
        run: |
          cargo lambda deploy lux-sync-api
          cargo lambda deploy lux-iot-authorizer
          cargo lambda deploy lux-discord-bot

      # Unauthenticated 401s are this API's health check: a correct 401 with the
      # typed error body proves the new binary cold-started (its init fetches
      # the Cognito JWKS before serving) and is routing requests.
      - name: Smoke sync-api
        run: |
          url=$(aws lambda get-function-url-config --function-name lux-sync-api --query FunctionUrl --output text)
          code=$(curl -s -o /tmp/body -w '%{http_code}' "${url}setups")
          cat /tmp/body; echo
          test "$code" = "401" && grep -q '"error"' /tmp/body

      # Invoke the authorizer directly with a garbage token: a well-formed
      # deny proves it cold-started (JWKS fetch) and rejects bad tokens.
      - name: Smoke iot-authorizer
        run: |
          aws lambda invoke --function-name lux-iot-authorizer \
            --cli-binary-format raw-in-base64-out \
            --payload '{"token":"smoke-test-garbage","protocolData":{"http":{"headers":{}}}}' \
            /tmp/authorizer.json >/dev/null
          cat /tmp/authorizer.json; echo
          grep -q '"isAuthenticated":false' /tmp/authorizer.json

      # The bot verifies Discord's ed25519 signature before anything else, so an
      # unsigned request answering 401 proves the new code is up and checking.
      - name: Smoke bot
        run: |
          url=$(aws lambda get-function-url-config --function-name lux-discord-bot --query FunctionUrl --output text)
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'content-type: application/json' -d '{}' "$url")
          echo "bot answered $code"
          test "$code" = "401"
