name: release

# release-please maintains a release PR (version bump + CHANGELOG) from
# conventional-commit history. Merging it cuts a vX.Y.Z tag + GitHub Release,
# which triggers the macOS build to attach the .dmg. The build is also runnable
# on demand for an existing tag via workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach the macOS bundle to (e.g. v0.1.0)"
        required: true

permissions: {}

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds the macOS app and attaches it to the release — after a release-please
  # release, or on a manual dispatch for an existing tag. Unsigned for now
  # (Gatekeeper will warn until Developer ID signing + notarization are wired in).
  build-macos:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write # AWS OIDC, to read the updater signing key
    env:
      TAG: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: bun install

      # Pull the updater signing key from AWS Secrets Manager via OIDC — no
      # long-lived AWS keys in GitHub. Written to a file so it never hits a log.
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-release-signing
          aws-region: us-west-1
      - name: Load updater signing key
        # printf '%s' + "$(...)" strips the trailing newline that --output text
        # adds, which otherwise breaks the base64 key decode (Invalid symbol 10).
        run: printf '%s' "$(aws secretsmanager get-secret-value --secret-id lux/updater-signing-key --query SecretString --output text)" > "$RUNNER_TEMP/updater.key"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ runner.temp }}/updater.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ env.TAG }}
          args: --target universal-apple-darwin
