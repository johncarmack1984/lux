name: desktop

# PR + main gate for the desktop app and the workspace crates. Every check here
# is something the release build (which only runs on a tag) would otherwise be
# the first to enforce — so a regression slips all the way to a release before it
# surfaces. Catching it on the PR (a few minutes) closes that gap:
#   - tauri-versions: @tauri-apps/* JS packages must share their minor with their
#     Rust crate counterparts (the drift that broke the 0.8.0 release).
#   - frontend: production build (also generates routeTree.gen.ts) + typecheck + lint.
#   - rust-test: cargo test across the workspace, including tests/bindings.rs — the
#     drift guard that fails when src/bindings.ts is stale.
#   - rust-clippy: the workspace lint gate at -D warnings.
#   - fmt: rustfmt, compiling nothing, so a formatting slip is red in seconds.
#
# No job here depends on another: every one starts at once and the gate costs
# the slowest of them, not their sum.
#
# Every job also carries the same guard, so a commit is gated once and not
# twice. The release-please PR — and the release commit it becomes — hold no
# code that main's tip was not already gated against, only version stamps
# (whose own failure mode has a dedicated tripwire in release.yml), and
# release.yml runs this entire workflow against the release tag before
# anything ships. So both skip here and that `ci` run is their record. Merges
# to main are PR-only, so anything else reaching main was gated as a PR first.
# A job added below needs the guard too.
#
# The guard's first two terms are what keeps a release gating itself: either
# says "another workflow called this one, never skip". github.workflow is the
# CALLER's name under workflow_call (see the concurrency note below), and
# release.yml's ci job pins a ref. Both are checked because the failure they
# prevent — a release shipping ungated — is the one failure worth two seatbelts,
# and because github.workflow fails open if this workflow is ever renamed.

on:
  pull_request:
    # Release-please's GITHUB_TOKEN branch pushes land this workflow's runs in
    # the action_required state (GitHub holds runs for events its own token
    # caused, and pull_request branch filters can only match the BASE branch,
    # so the machine branches cannot be excluded here). release.yml approves
    # those held runs right after pushing, and the per-job guard below skips
    # their work: the release PR gets a concluded, near-free gate instead of
    # either an "awaiting approval" banner or a full re-run of main's tip.
    paths:
      - 'apps/desktop/**'
      - 'apps/site/**'
      - 'packages/**'
      - 'services/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'bun.lock'
      # Any workflow change runs this gate: the workflow-permissions job
      # below is the account's guard against a permissions-less workflow
      # inheriting the write-capable default token.
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'apps/desktop/**'
      - 'apps/site/**'
      - 'packages/**'
      - 'services/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'package.json'
      - 'bun.lock'
      # Any workflow change runs this gate: the workflow-permissions job
      # below is the account's guard against a permissions-less workflow
      # inheriting the write-capable default token.
      - '.github/workflows/**'
  # Reusable form: release.yml calls this as its gate, so nothing ships from a
  # release run unless the exact release commit passes the same checks as a PR.
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out (empty = the triggering sha)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

# Ordinary PRs supersede (a force-push cancels the stale run); pushes to main QUEUE
# instead — every main commit must end with a completed CI record, so
# back-to-back merges can't cancel each other's runs (that burned 69642ae,
# whose push CI was cancelled after 4s by the release merge landing behind
# it). github.workflow is the CALLER's name under workflow_call, so a
# release-gate invocation groups separately from the push-triggered run.
# The "-gate" suffix is load-bearing: without it, a release-run invocation
# computes the group "release-<ref>" — the SAME group the calling release
# run itself holds — and the called workflow deadlocks queueing behind its
# own parent (GitHub kills the job at startup; broke the v0.12.2 run).
concurrency:
  group: ${{ github.workflow }}-gate-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # The repo's default workflow token is read+write (the release pipeline
  # needs it), so a workflow file without its own permissions block silently
  # inherits a write-capable token. Every workflow must say what it wants.
  workflow-permissions:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}
      - name: Every workflow declares a permissions block
        run: |
          fail=0
          for f in .github/workflows/*.yml; do
            grep -qE '^permissions:' "$f" \
              || { echo "::error file=$f::missing a top-level permissions block — the default token is read+write"; fail=1; }
          done
          exit "$fail"

  deny:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # The deny action is a musl docker container; keep the workspace's
      # sccache wrapper out of it.
      RUSTC_WRAPPER: ""
      SCCACHE_GHA_ENABLED: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check advisories bans licenses sources

  tauri-versions:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: apps/desktop/package.json

      - run: bun install --frozen-lockfile

      - name: check @tauri-apps JS <-> crate version match
        run: bun run check:tauri-versions

  frontend:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: apps/desktop/package.json

      - run: bun install --frozen-lockfile

      # vite build emits the production bundle and the gitignored
      # routeTree.gen.ts that the typecheck depends on, so it runs first and
      # doubles as a bundler/import check.
      - run: bun run build

      - run: bun run typecheck

      - run: bun run lint

  # Build the three Lambda services exactly as the release deploy job will
  # (static musl, release profile, same package names) — so a broken link, a
  # renamed crate, or a musl-hostile dependency is a red PR check instead of a
  # failed release run.
  lambda-build:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "."
          cache-targets: "false"

      - name: Build (static musl, release profile)
        run: cargo build --release --target x86_64-unknown-linux-musl -p lux-sync-api -p lux-iot-authorizer -p lux-discord-bot -p lux-apple-auth

      - name: sccache stats
        if: ${{ always() }}
        run: sccache --show-stats

  # Formatting needs no system libraries, no frontend bundle and no compiler
  # cache, so it answers in seconds on a runner of its own instead of riding
  # inside a job that compiles. rust-toolchain.toml pins the channel and the
  # rustfmt component, the same way the clippy job gets clippy.
  fmt:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch

      - run: cargo fmt --all --check

  # The test suite and the lint gate are two independent compilations of the
  # same workspace, and neither one's result is an input to the other. Run
  # sequentially they cost their sum and a lint error waits out the whole suite
  # before it surfaces; as two jobs the gate costs the longer of the two and
  # each reports the moment it knows. They share their setup through a composite
  # action rather than a copy, so the two can never drift apart.
  rust-test:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: ./.github/actions/setup-rust-desktop

      # Full workspace suite: desktop unit tests (incl. the cloud reconcile logic)
      # plus tests/bindings.rs, which regenerates the IPC bindings and fails if
      # src/bindings.ts is stale. --locked also asserts Cargo.lock is committed in
      # sync. #[ignore]'d live-AWS round-trips are skipped (no credentials needed).
      - name: cargo test
        run: cargo test --workspace --locked

      - name: sccache stats
        if: ${{ always() }}
        run: sccache --show-stats

  rust-clippy:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}

      - uses: ./.github/actions/setup-rust-desktop

      # Lint gate: deny-level workspace lints fail this job (notably
      # clippy::unwrap_used — production code must not unwrap; see
      # [workspace.lints] in the root Cargo.toml). Default targets only, so
      # test code keeps idiomatic unwraps. `-D warnings` fails the build on any
      # warning, so clippy's default-warn lints can't slip through unnoticed.
      - name: cargo clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: sccache stats
        if: ${{ always() }}
        run: sccache --show-stats

  # The product site + shared UI package: typecheck and production build, so a
  # PR can't land something the deploy workflow (site.yml) would choke on.
  site:
    if: "${{ github.workflow != 'desktop' || inputs.ref != '' || !startsWith(github.head_ref, 'release-please--') && !startsWith(github.event.head_commit.message, 'chore(main): release ') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/site typecheck
      - run: bun run --cwd apps/site build
