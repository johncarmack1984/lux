# Drafts the App Store "What's New" file on the release PR: Claude writes a
# first pass from the release's CHANGELOG section and the job commits it to
# the PR branch as apps/desktop/store-notes/<version>.md. Edit the file in the
# PR — the draft never overwrites a human edit (delete the file to redraft) —
# and appstore.yml refuses to submit a version whose file is missing, so the
# human pass is structural, not optional.
name: store-notes

on:
  pull_request:
    types: [opened, synchronize]

# Back-to-back pushes to a release branch (release-please rebuild, then the
# version-stamp sync seconds later) start overlapping drafters whose push
# retries rebase into each other's identical draft commit and die on the
# conflict. Newest event wins; the superseded run is cancelled mid-flight.
concurrency:
  group: store-notes-${{ github.head_ref }}
  # Serialize, don't cancel: the write-once drafter (scripts/
  # draft-store-notes.ts) makes a queued follow-up run a green no-op, whereas
  # a cancellation paints a red ✗ on the superseded commit in the release PR.
  cancel-in-progress: false

permissions: {}

jobs:
  draft:
    # Release PRs only, and never fork heads (the job assumes an OIDC role).
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read # the restore step reads prior branch tips from run history
      contents: write # push the drafted file to the release PR branch
      id-token: write # AWS OIDC, to read the Anthropic API key
    steps:
      # Credentials + the release App token come first: the draft commit below
      # must be pushed with the App token, not GITHUB_TOKEN — a GITHUB_TOKEN
      # push starts no workflow runs, which left the release branch tip
      # ungated (and the PR "awaiting approval"). The App-token push triggers
      # the PR gate normally; the retriggered copy of THIS workflow finds
      # nothing new to commit and exits, so there is no push loop. Same
      # pattern (and the same App) as release.yml, gated on the same variable.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: arn:aws:iam::735853783919:role/lux-store-notes
          aws-region: us-west-1

      - name: Load release-bot App private key
        id: app-key
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' }}
        # Multi-line PEM into $GITHUB_ENV via a heredoc; never echoed, so the
        # key stays out of the logs. Fail-soft: the role's grant on this secret
        # ships via terraform apply, so until that lands the step logs and the
        # push falls back to GITHUB_TOKEN (today's behavior) instead of
        # failing the draft.
        run: |
          if key=$(aws secretsmanager get-secret-value --secret-id lux/release-app-private-key --query SecretString --output text 2>/dev/null); then
            {
              echo "RELEASE_APP_PRIVATE_KEY<<__EOF__"
              printf '%s\n' "$key"
              echo "__EOF__"
            } >> "$GITHUB_ENV"
            echo "loaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "app key unreadable (role grant not applied yet?); pushing with GITHUB_TOKEN"
          fi

      - name: Mint push token (GitHub App)
        id: app-token
        if: ${{ vars.RELEASE_APP_CLIENT_ID != '' && steps.app-key.outputs.loaded == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ env.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}
          # The real branch (not the merge ref) — the draft is pushed to it.
          ref: ${{ github.head_ref }}
          # Full history: the draft guard and the restore step attribute the
          # notes file by commit author, which a depth-1 clone cannot see, and
          # the push retry below rebases.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # release-please rebuilds the release branch from main on every push to
      # main, discarding the drafted file and any human edit to it. Recover
      # the newest human-authored copy from prior branch tips (via run
      # history) before deciding whether to draft.
      - name: Restore a human-edited draft (release rebases discard it)
        id: restore
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun scripts/restore-store-notes.ts

      - name: Load Anthropic API key
        if: steps.restore.outputs.restored != 'true'
        run: |
          key=$(aws secretsmanager get-secret-value --secret-id lux/anthropic-api-key --query SecretString --output text)
          echo "::add-mask::$key"
          echo "ANTHROPIC_API_KEY=$key" >> "$GITHUB_ENV"

      - name: Draft store notes
        if: steps.restore.outputs.restored != 'true'
        run: bun scripts/draft-store-notes.ts

      - name: Commit the draft (if new)
        # Pushed with the App token from the checkout above, so the PR gate
        # runs on the branch tip; the retriggered store-notes run no-ops.
        env:
          BRANCH: ${{ github.head_ref }}
          RESTORED: ${{ steps.restore.outputs.restored }}
          RESTORE_AUTHOR: ${{ steps.restore.outputs.author }}
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain apps/desktop/store-notes)" ]; then
            echo "nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/store-notes
          if [ "$RESTORED" = "true" ]; then
            # Keep the human author so the never-overwrite guard holds.
            git commit --author "$RESTORE_AUTHOR" -m "chore: restore edited App Store notes"
          else
            git commit -m "chore: draft App Store notes"
          fi
          # The release workflow's Cargo.lock sync pushes to this branch too —
          # rebase and retry instead of failing on a non-fast-forward.
          for _ in 1 2 3; do
            git push origin "HEAD:$BRANCH" && exit 0
            git pull --rebase origin "$BRANCH"
          done
          exit 1
