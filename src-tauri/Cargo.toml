[package]
name = "lux"
version = "0.1.0"
description = "A DMX lighting control system for Enttec Open DMX USB devices."
authors = ["John Carmack"]
edition = "2021"
repository = "https://github.com/johncarmack1984/lux"
license = "GNU GPLv3"
readme = "../README.md"

[lib]
name = "lux_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0.0-beta", features = [
    # "isolation",
    "codegen",
] }

[dev-dependencies]
tauri = { version = "2.0.0-beta", features = ["devtools", "test", "tracing"] }

[dependencies]
log = "^0.4"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "2.0.0-beta", features = [
    "tray-icon",
    # "image-ico",
    # "image-png",
    # "tracing",
    # "test",
    # "objc-exception",
    # "linux-ipc-protocol",
    # "linux-libxdo",
    # "devtools",
    # "native-tls",
    # "native-tls-vendored",
    # "rustls-tls",
    # "webview-data-url",
    # "config-json5",
    # "macos-proxy",
    # "tracing",
    # "test",
    # "objc-exception",
    # "linux-ipc-protocol",
    # "linux-libxdo",
    # "devtools",
    # "native-tls",
    # "native-tls-vendored",
    # "rustls-tls",
    # "webview-data-url",
    # "config-json5",
    # "macos-proxy",
] }
tauri-plugin-log = "2.0.0-beta.3"
# tauri-plugin-cli = "^2.0.0-beta"
# tauri-plugin-notification = "2.0.0-beta"
# tauri-plugin-positioner = { version = "^2.0.0-beta", features = ["tray-icon"] }
# tauri-plugin-shell = "^2.0.0-beta"
# tauri-plugin-window-state = "^2.0.0-beta"
# thiserror = "1.0.58"
# tokio = { version = "1", features = ["full"] }
# rspc-tauri2 = { git = "https://github.com/specta-rs/tauri2", branch = "main" }
# taurpc = { git = "https://github.com/MatsDK/TauRPC", branch = "tauri-v2" }
specta = { version = "1.0.5", features = ["serde", "typescript"] }
# specta = { version = "2.0.0-rc.5", features = [
#     "typescript",
#     "export",
#     "uuid",
#     #     "tokio",
# ] }
uuid = { version = "1.4.1", features = [
    "v4", # Lets you generate random UUIDs
    #     "fast-rng",          # Use a faster (but still sufficiently random) RNG
    #     "macro-diagnostics", # Enable better diagnostics for compile-time UUIDs
] }
# tauri-specta = { version = "2.0.0-rc.4", features = [
#     "javascript",
#     "typescript",
# ] }
# array-init = "2.1.0"
# dotenvy = "0.15.7"
# enttecopendmx = "0.1.0"
# libftd2xx = { version = "0.32.4", features = ["static"] }
# libsql = { git = "https://github.com/tursodatabase/libsql" }
# reqwest = { version = "0.12.2", features = ["json", "blocking"] }
# strum = { version = "0.26.2", features = ["derive"] }
# strum_macros = "0.26.2"


# [patch.crates-io]
# sqlite3-parser = { git = "https://github.com/LucioFranco/lemon-rs" }

# [profile.dev.package.sqlx-macros]
# opt-level = 3

# default to small, optimized release binaries
[profile.release]
panic = "abort"
codegen-units = 1
lto = true
incremental = false
opt-level = "s"

[profile.dev]
debug = 0

[features]
# this feature is used for production builds or when `devPath` points to the filesystem and the built-in dev server is disabled.
# If you use cargo directly instead of tauri's cli you can use this feature flag to switch between tauri's `dev` and `build` modes.
# DO NOT REMOVE!!
prod = ["tauri/custom-protocol"]
