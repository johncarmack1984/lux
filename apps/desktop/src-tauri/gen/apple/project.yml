# Rendered from src-tauri/ios/project.yml.hbs (bundle > iOS > template) by
# `tauri ios init` — every lux customization (signing team, Info.plist keys,
# entitlements, the Xcode-26 stamp) lives in the template, so regenerating
# gen/apple reproduces them instead of silently dropping them (issue #138).
# Edit the template, never gen/apple/project.yml: a re-init overwrites it.
# The CLI resolves the template path against the process cwd, so the
# tauri.conf.json value assumes the canonical invocation: `bun run tauri`
# from apps/desktop.
name: lux
options:
  bundleIdPrefix: com.johncarmack.lux
  # Pinned rather than templated: bundle > iOS > minimumSystemVersion is unset
  # (the CLI default drifted to 13.0 after this project scaffolded at 14.0).
  deploymentTarget:
    iOS: 14.0
  # Stamps LastUpgradeCheck/LastUpgradeVersion as already reviewed by Xcode 26,
  # so it stops offering "Update to recommended settings" — those
  # recommendations are wrong for this generated project (script sandboxing
  # breaks the Rust build phase, auto-architectures fights the per-arch
  # libapp.a layout).
  xcodeVersion: "26.6"
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: lux
      PRODUCT_BUNDLE_IDENTIFIER: com.johncarmack.lux
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  lux_iOS:
    type: application
    platform: iOS
    # Keeps the generated product reference named lux.app (matching
    # PRODUCT_NAME and the scheme's runnable) — without it xcodegen names the
    # product after the target, and Xcode's Run action asserts on the mismatch.
    productName: lux
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Externals holds gitignored build products (libapp.a); exclude them all
      # so regeneration never sweeps a stale artifact into the bundle as a
      # resource and the pbxproj stays independent of local build state.
      - path: Externals
        excludes: ["**"]
      - path: lux_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: lux_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # xcodegen regenerates Info.plist from these properties — every custom
        # key must live here, or a `xcodegen generate` run silently drops it.
        NSLocalNetworkUsageDescription: lux discovers and controls DMX lighting nodes (Art-Net / sACN) on your local network.
        # Only standard-exempt TLS (rustls); skips the per-build export question.
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Cosmetic: `tauri ios build` restamps both values (source Info.plist
        # included) from tauri.conf.json's version on every build, so these only
        # need to be valid, not current.
        CFBundleShortVersionString: 0.17.0
        CFBundleVersion: "0.17.0"
    entitlements:
      path: lux_iOS/lux_iOS.entitlements
      # xcodegen regenerates this file from these properties on every build
      # (same as Info.plist above) — a key set only in the .entitlements file
      # is silently wiped. Multicast Networking is Apple-granted (request
      # URZMNY2RN8) and required to send sACN/Art-Net on-device.
      properties:
        com.apple.developer.networking.multicast: true
        # Sign in with Apple (the native sheet; capability enabled on the App
        # ID 2026-07-17). Must live HERE, not only in the .entitlements file,
        # or the next xcodegen run wipes it (see the comment above).
        com.apple.developer.applesignin:
          - Default
        # Password/credential AutoFill against lux.johncarmack.com (AASA served
        # from apps/site). Was file-only before this line — same wipe trap.
        com.apple.developer.associated-domains:
          - webcredentials:lux.johncarmack.com
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        # Device signing: Xcode's automatic management, pinned to the team so
        # an `xcodegen generate` can never strip what Xcode configured. The
        # dev cert/profile live in the developer account, not the repo.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: T3UN6N5K6Z
        # Explicitly off: the "Build Rust Code" phase writes cargo's target/
        # and Externals/, far outside any sandbox a script phase may declare.
        # An accepted Xcode "recommended settings" pass once flipped this on.
        ENABLE_USER_SCRIPT_SANDBOXING: false
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64 
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      # The Sign in with Apple sheet (crates/lux-apple-id): rust staticlibs do
      # not carry framework auto-link flags through to Xcode's link line, so
      # the project must name it. Mirrored in tauri.conf.json bundle.iOS.frameworks
      # for regenerated projects.
      - sdk: AuthenticationServices.framework
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: bun tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
